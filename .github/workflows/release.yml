name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check tag matches Cargo.toml version
        run: |
          ver=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          if [ "v$ver" != "$GITHUB_REF_NAME" ]; then
            echo "tag $GITHUB_REF_NAME does not match Cargo.toml version v$ver" >&2
            exit 1
          fi
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: taiki-e/install-action@cross
        if: matrix.cross
      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target "${{ matrix.target }}"
          else
            cargo build --release --target "${{ matrix.target }}"
          fi
      - name: Name artifact + checksum
        run: |
          asset="artisan-comp-${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/artisan-comp" "$asset"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$asset" > "$asset.sha256"
          else
            shasum -a 256 "$asset" > "$asset.sha256"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artisan-comp-${{ matrix.target }}
            artisan-comp-${{ matrix.target }}.sha256
